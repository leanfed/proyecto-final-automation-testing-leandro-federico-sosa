[pytest]
minversion = 8.0
testpaths =
    tests
python_files =
    test_*.py
python_classes =
    Test*
python_functions =
    test_*
addopts =
    -v
    --strict-markers
    --tb=short
markers =
    ui: pruebas de interfaz web con Selenium WebDriver
    login: pruebas relacionadas con autenticación
    api: pruebas de API con Requests
    smoke: pruebas críticas de rápida ejecución
    regression: pruebas de regresión
    negative: escenarios negativos o de error esperado
    e2e: flujo completo de punta a punta
html_report_title = Proyecto Final Automation Testing - Federico Sosa
html_report_description = Framework de pruebas automatizadas con Pytest, Selenium WebDriver, Requests, POM, reportes HTML, logging y capturas ante fallos.
